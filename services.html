<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Our Services - LuxeGlow Salon</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        Our Services 💖
    </header>

    <section class="hero">
        <h1>Beauty Services</h1>
        <p>Luxury treatments designed just for you</p>
    </section>

    <!-- FILTER BUTTONS -->
    <div class="filter-buttons">
        <button onclick="filterServices('all')">All</button>
        <button onclick="filterServices('hair')">Hair</button>
        <button onclick="filterServices('nails')">Nails</button>
        <button onclick="filterServices('lashes')">Lashes</button>
        <button onclick="filterServices('makeup')">Makeup</button>
    </div>

    <!-- SERVICES -->
    <section class="gallery">

        <div class="service-card hair">
            <img src="images/hair.jpg" alt="Hair Styling">
            <h3>Hair Styling</h3>
            <p>Ksh 2,000</p>
            <a href="contact.html" class="btn">Book This Service</a>
        </div>

        <div class="service-card nails">
            <img src="images/nails.jpg" alt="Nail Extensions">
            <h3>Nail Extensions</h3>
            <p>Ksh 1,500</p>
            <a href="contact.html" class="btn">Book This Service</a>
        </div>

        <div class="service-card lashes">
            <img src="images/lashes.jpg" alt="Lash Extensions">
            <h3>Lash Extensions</h3>
            <p>Ksh 2,500</p>
            <a href="contact.html" class="btn">Book This Service</a>
        </div>

        <div class="service-card makeup">
            <img src="images/makeup.jpg" alt="Makeup Glam">
            <h3>Makeup Glam</h3>
            <p>Ksh 3,000</p>
            <a href="contact.html" class="btn">Book This Service</a>
        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
