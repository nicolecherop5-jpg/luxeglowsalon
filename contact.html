<!DOCTYPE html>
<html>

<head>
    <title>Contact - LuxeGlow Salon</title>

</head>

<body>

    <body>

        <header>
            Book Appointment 💖
        </header>

        <form>

            <select required>

        </form>

        <a href="index.html" class="btn">Back Home</a>

        <script src="script.js"></script>
    </body>
</body>

</html>
